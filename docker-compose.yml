services:
  postgresqldb:
    image: postgres:17-alpine
    container_name: postgresqldb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eT6RXTio6IDrhYVSdSPT1fnUuHsDbFrY
      POSTGRES_DB: postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pg_network
  pgadmin:
    image: dpage/pgadmin4:9.15
    ports:
      - 5050:80
    environment:
      PGADMIN_DEFAULT_EMAIL: contato.matheusoliv@outlook.pt
      PGADMIN_DEFAULT_PASSWORD: asdw_Fxugn2
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pg_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  pg_network:
    driver: bridge